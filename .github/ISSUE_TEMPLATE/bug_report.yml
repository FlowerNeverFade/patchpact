name: Bug report
description: Report a reproducible bug in PatchPact
title: "[bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please share enough context for someone else to reproduce it without guessing.

  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Tell us the actual behavior and why it is a problem.
      placeholder: PatchPact generated a missing-contract packet even though the PR body includes PatchPact-Contract: #42.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: PatchPact should link the approved contract and generate an aligned or partial packet instead of needs-contract.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Include webhook event type, repository state, commands, and any fixture or payload details.
      placeholder: |
        1. Configure PatchPact in soft-gate mode
        2. Open PR with PatchPact-Contract: #42
        3. Trigger pull_request event
        4. Inspect generated packet
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Share anything relevant such as provider mode, storage mode, OS, Node version, or deployment details.
      placeholder: Node 24, memory storage, inline jobs, mock provider

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste stack traces, failing job payloads, screenshots, or relevant snippets.
