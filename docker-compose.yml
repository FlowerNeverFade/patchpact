version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: patchpact
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  patchpact-web:
    profiles: ["app"]
    build:
      context: .
    environment:
      PATCHPACT_APP: web
      PORT: 3000
      PATCHPACT_BASE_URL: http://localhost:3000
      PATCHPACT_STORAGE: postgres
      PATCHPACT_INLINE_JOBS: "false"
      PATCHPACT_DEFAULT_PROVIDER: mock
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/patchpact
      REDIS_URL: redis://redis:6379
      PATCHPACT_GITHUB_WEBHOOK_SECRET: development-secret
    depends_on:
      - postgres
      - redis
    ports:
      - "3000:3000"

  patchpact-worker:
    profiles: ["app"]
    build:
      context: .
    environment:
      PATCHPACT_APP: worker
      PATCHPACT_STORAGE: postgres
      PATCHPACT_INLINE_JOBS: "false"
      PATCHPACT_DEFAULT_PROVIDER: mock
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/patchpact
      REDIS_URL: redis://redis:6379
      PATCHPACT_GITHUB_WEBHOOK_SECRET: development-secret
    depends_on:
      - postgres
      - redis

volumes:
  postgres-data:
  redis-data:
